name: Build IPQ60XX Firmware (24.10-nss)

on:
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动添加插件包，多个请用 \\n 分隔'
        required: false
        type: string
      TEST:
        description: '是否只生成配置，不编译固件'
        default: 'false'
        required: false
        type: boolean

permissions: write-all

jobs:
  build:
    name: Build IPQ60XX Firmware
    runs-on: ubuntu-latest
    env:
      WRT_TARGET: qualcommax
      WRT_CONFIG: IPQ60XX-WIFI-YES
      WRT_THEME: argon
      WRT_NAME: ImmortalWrt
      WRT_SSID: ImmortalWrt
      WRT_WORD: 12345678
      WRT_IP: 192.168.2.1
      WRT_REPO: https://github.com/qosmio/openwrt-ipq.git
      WRT_BRANCH: 24.10-nss
      WRT_SOURCE: qosmio/openwrt-ipq
      WRT_PACKAGE: ${{ inputs.PACKAGE }}
      WRT_TEST: ${{ inputs.TEST }}
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup build environment
        run: |
          sudo apt update -yqq
          sudo apt install -y build-essential flex bison gawk gcc-multilib g++-multilib gettext \
            libncurses5-dev libncursesw5-dev zlib1g-dev libssl-dev libelf-dev \
            python3 python3-setuptools rsync unzip file wget curl git subversion bc dos2unix \
            python3-netifaces libfuse-dev libpam0g-dev libtirpc-dev liblzma-dev libev-dev libsnmp-dev -y
          sudo apt purge -yqq firefox
          sudo apt full-upgrade -yqq
          sudo apt autoremove --purge -yqq
          sudo apt autoclean -yqq
          sudo apt clean -yqq
          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone firmware source
        run: |
          git clone --depth=1 --branch $WRT_BRANCH $WRT_REPO ./wrt/
          cd ./wrt/
          echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

      - name: Normalize scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Prepare config
        run: |
          cd ./wrt/
          cp nss-setup/config-nss.seed .config
          make defconfig -j$(nproc)

          # 使用你仓库 Scripts 和 Config 生成完整配置
          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh
          cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          $GITHUB_WORKSPACE/Scripts/Settings.sh

          # 设置 NSS 固件版本，避免缺失
          echo "CONFIG_NSS_FIRMWARE_VERSION_12_5=y" >> .config
          make defconfig -j$(nproc)
          make clean -j$(nproc)

      - name: Download sources
        if: ${{ env.WRT_TEST != 'true' }}
        run: |
          cd ./wrt/
          make download -j$(nproc)

      - name: Compile firmware
        if: ${{ env.WRT_TEST != 'true' }}
        run: |
          cd ./wrt/
          make -j$(nproc) || make -j1 V=s

      - name: Package firmware and config
        run: |
          cd ./wrt/ && mkdir -p ./upload/
          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_SOURCE"-"$WRT_BRANCH"-$(date +'%y.%m.%d-%H.%M.%S').txt
          if [[ $WRT_TEST != 'true' ]]; then
            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;
            make clean -j$(nproc)
          fi

      - name: Create GitHub Release
        if: ${{ env.WRT_TEST != 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.WRT_CONFIG }}-${{ env.WRT_SOURCE }}-${{ env.WRT_BRANCH }}-$(date +'%y.%m.%d-%H.%M.%S')
          files: ./wrt/upload/*
          body: |
            固件由 GitHub Actions 自动生成
            源码: ${{ env.WRT_REPO }}
            分支: ${{ env.WRT_BRANCH }}
            提交: ${{ env.WRT_HASH }}
            配置: ${{ env.WRT_CONFIG }}
            平台: ${{ env.WRT_SOURCE }}
            登录地址: ${{ env.WRT_IP }}
            WIFI: ${{ env.WRT_SSID }} / ${{ env.WRT_WORD }}
